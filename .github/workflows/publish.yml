name: Publish to NPM

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: NPM
    permissions:
      contents: read
      id-token: write # Required for Trusted Publishing OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      # Stamp the official build token into the compiled output so the telemetry
      # backend can distinguish this official npm release from source forks.
      # BUILD_TOKEN is a repo secret and must equal the telemetry Worker's
      # BUILD_TOKEN secret. inject-token fails the job if the token is missing
      # or the placeholder is absent, so an unstamped build never publishes.
      - run: npm run inject-token
        env:
          BUILD_TOKEN: ${{ secrets.BUILD_TOKEN }}

      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Mirror publish to deprecated react-native-ai-debugger
        run: |
          VERSION=$(npm pkg get version | tr -d '"')
          npm pkg set name=react-native-ai-debugger
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
